name: Build BakkesMod Plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone BakkesMod SDK
        run: git clone --depth 1 https://github.com/bakkesmodorg/BakkesModSDK.git bakkesmodsdk

      - name: Configure and Build
        run: |
          cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: BoostHUD-Plugin
          path: build/Release/BoostHUD.dll
