name: Build BoostHUD Plugin

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v1

      - name: Restore NuGet packages
        run: nuget restore

      - name: Create project file
        shell: pwsh
        run: |
          @'
          <?xml version="1.0" encoding="utf-8"?>
          <Project DefaultTargets="Build" ToolsVersion="15.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <PropertyGroup>
              <ConfigurationType>DynamicLibrary</ConfigurationType>
              <PlatformToolset>v143</PlatformToolset>
              <CharacterSet>Unicode</CharacterSet>
              <TargetName>BoostHUD</TargetName>
              <OutDir>$(SolutionDir)bin\$(Configuration)\</OutDir>
            </PropertyGroup>
            <Import Project="packages\BakkesMod.SDK.142.0.0\build\native\BakkesMod.SDK.targets" Condition="Exists('packages\BakkesMod.SDK.142.0.0\build\native\BakkesMod.SDK.targets')" />
            <ItemGroup>
              <ClCompile Include="BoostHUD.cpp" />
            </ItemGroup>
          </Project>
          '@ | Out-File -FilePath BoostHUD.vcxproj -Encoding utf8

      - name: Build
        run: msbuild BoostHUD.vcxproj /p:Configuration=Release /p:Platform=x64

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: BoostHUD-Plugin
          path: bin\Release\BoostHUD.dll
